version: '3.8'

# Video Clipper 测试版 Docker Compose 配置
# 用于隔离测试环境，与宿主机上的正式版完全独立

services:
  # Redis（测试版专用）
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # 映射到 6380，避免与正式版 6379 冲突
    volumes:
      - redis_beta_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 数据库（测试版专用）
  db:
    image: sqlite:latest
    volumes:
      - ./data:/app/data
    # SQLite 不需要单独服务，这里只是挂载数据目录

  # 后端 API（测试版）
  backend:
    build:
      context: .
      dockerfile: Dockerfile.beta
    ports:
      - "8030:8030"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/video_clipper_beta.db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_QUEUE_NAME=processing_beta
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker（测试版）
  worker:
    build:
      context: .
      dockerfile: Dockerfile.beta
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/video_clipper_beta.db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_QUEUE_NAME=processing_beta
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    depends_on:
      - backend
      - redis
    command: celery -A backend.core.celery_app worker --loglevel=info --concurrency=2 -Q processing_beta
    restart: unless-stopped

  # 前端（测试版）
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend.beta
    ports:
      - "3030:3030"
    environment:
      - VITE_API_PORT=8030
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_beta_data:
